<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Arena FPS v8 | Welcome Update</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; user-select: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* HUD */
        #hud { position: absolute; bottom: 30px; left: 30px; }
        .bar-container { width: 220px; height: 15px; background: rgba(255,255,255,0.1); border: 2px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: #ff4757; transition: width 0.2s; }
        #weapon-info { margin-top: 10px; font-size: 18px; color: #f1c40f; font-weight: bold; }
        
        #score-board { position: absolute; top: 30px; right: 30px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; }
        
        /* Scope Visual */
        #scope-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; pointer-events: none;
            background: radial-gradient(circle, transparent 25%, rgba(0,0,0,0.9) 60%);
        }
        .scope-line-v { position: absolute; left: 50%; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.3); }
        .scope-line-h { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255,255,255,0.3); }
        #scope-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #ff0000; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 5px red; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid #00ff00; border-radius: 50%; transform: translate(-50%, -50%); }

        /* Menus */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; text-align: center; }
        .welcome-text { font-size: 20px; color: #1e90ff; text-transform: uppercase; letter-spacing: 4px; margin-bottom: -10px; opacity: 0.8; }
        .btn { padding: 12px 45px; font-size: 18px; background: #1e90ff; color: white; border: none; cursor: pointer; margin: 10px; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #3742fa; transform: scale(1.05); }

        .settings-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin: 15px 0; width: 280px; border: 1px solid #333; }
        input[type=range] { width: 100%; cursor: pointer; }

        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.2); display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="damage-flash"></div>
        <div id="scope-overlay">
            <div class="scope-line-v"></div>
            <div class="scope-line-h"></div>
            <div id="scope-dot"></div>
        </div>
        <div id="crosshair"></div>
        
        <div id="hud">
            <div class="bar-container"><div id="hp-fill"></div></div>
            <div id="weapon-info">ASSAULT RIFLE</div>
        </div>

        <div id="score-board">SCORE: <span id="score-val">0</span></div>

        <div id="menu-screen" class="overlay">
            <div class="welcome-text">Selamat Datang</div>
            <h1 style="color:#ffffff; font-size: 50px; letter-spacing: 5px;">Z-ARENA PRO</h1>
            
            <div class="settings-box">
                <label style="font-size: 14px; color: #aaa;">Mouse Sensitivity: <span id="sens-value">2.0</span></label>
                <input type="range" id="sens-slider" min="0.1" max="10.0" step="0.1" value="2.0">
            </div>

            <div style="margin-bottom: 20px;">
                <button class="btn" onclick="selectWeapon('Rifle', 1, 120)">RIFLE</button>
                <button class="btn" onclick="selectWeapon('Sniper', 10, 800)" style="background:#444">SNIPER</button>
            </div>

            <button class="btn" style="background:#2ed573" onclick="startGame()">MASUK ARENA</button>
        </div>

        <div id="death-screen" class="overlay" style="display:none">
            <h1 style="color:#ff4757">PERMAINAN BERAKHIR</h1>
            <button class="btn" onclick="location.reload()">COBA LAGI</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, clock;
        let player = { hp: 100, score: 0, vY: 0, grounded: true, dmg: 1, rate: 120 };
        let settings = { mouseSens: 0.002 };
        let keys = { w:false, s:false, a:false, d:false, shift:false };
        let isRunning = false, isScoped = false, canShoot = true;
        let bullets = [], obstacles = [], staticTargets = [], enemyBot = null;

        // UI Sensitivity
        const sensSlider = document.getElementById('sens-slider');
        sensSlider.oninput = (e) => {
            document.getElementById('sens-value').innerText = e.target.value;
            settings.mouseSens = e.target.value * 0.001;
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 5, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            createWorld();
            setupControls();
            animate();
        }

        function createWorld() {
            // Lantai
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({color: 0x111111}));
            floor.rotation.x = -Math.PI/2;
            floor.receiveShadow = true;
            scene.add(floor);

            const createBox = (w, h, d, x, y, z, color = 0x333333) => {
                const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color}));
                b.position.set(x, y + h/2, z);
                b.castShadow = true; b.receiveShadow = true;
                scene.add(b);
                obstacles.push(b);
            };

            // Rintangan (Parkour)
            createBox(6, 1, 6, 0, 0, -10);     
            createBox(4, 2, 4, 0, 1, -15);    
            createBox(4, 4, 4, 0, 2, -22, 0x1e90ff); 
            createBox(15, 0.5, 3, -10, 3, 0); 
            createBox(8, 0.5, 8, 10, 5, -10, 0x555555); // Platform tinggi

            // Spawn Target Statis
            for(let i=0; i<6; i++) {
                spawnStaticTarget();
            }
        }

        function spawnStaticTarget() {
            const t = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.8, 0.8),
                new THREE.MeshPhongMaterial({color: 0xf1c40f, emissive: 0x443300})
            );
            t.position.set((Math.random()-0.5)*50, 1.5 + Math.random()*8, (Math.random()-0.5)*50);
            scene.add(t);
            staticTargets.push(t);
        }

        function spawnBot() {
            if(enemyBot) scene.remove(enemyBot.mesh);
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 1.2, 4, 8), new THREE.MeshPhongMaterial({color: 0xff4757}));
            body.position.y = 1.1;
            group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), new THREE.MeshPhongMaterial({color: 0xffffff}));
            head.position.y = 2.0;
            group.add(head);
            group.position.set(15, 0, 15);
            scene.add(group);
            enemyBot = { mesh: group, hp: 50, lastShot: 0, targetPos: new THREE.Vector3() };
            setNewBotDir();
        }

        function setNewBotDir() {
            enemyBot.targetPos.set((Math.random()-0.5)*45, 0, (Math.random()-0.5)*45);
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                const k = e.code.toLowerCase();
                if(k === 'keyw') keys.w = true;
                if(k === 'keys') keys.s = true;
                if(k === 'keya') keys.a = true;
                if(k === 'keyd') keys.d = true;
                if(k === 'shiftleft') keys.shift = true;
                if(k === 'space' && player.grounded) player.vY = 0.16;
                if(k === 'keym') { isRunning = false; document.exitPointerLock(); document.getElementById('menu-screen').style.display = 'flex'; }
            });
            document.addEventListener('keyup', (e) => {
                const k = e.code.toLowerCase();
                if(k === 'keyw') keys.w = false;
                if(k === 'keys') keys.s = false;
                if(k === 'keya') keys.a = false;
                if(k === 'keyd') keys.d = false;
                if(k === 'shiftleft') keys.shift = false;
            });

            document.addEventListener('mousedown', (e) => {
                if(e.button === 0) shoot();
                if(e.button === 2) { isScoped = true; updateScope(true); }
            });
            document.addEventListener('mouseup', (e) => {
                if(e.button === 2) { isScoped = false; updateScope(false); }
            });
            document.addEventListener('contextmenu', e => e.preventDefault());

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement) {
                    let sens = isScoped ? settings.mouseSens * 0.4 : settings.mouseSens;
                    camera.rotation.y -= e.movementX * sens;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x - e.movementY * sens));
                }
            });
        }

        function updateScope(active) {
            document.getElementById('scope-overlay').style.display = active ? 'block' : 'none';
            document.getElementById('crosshair').style.display = active ? 'none' : 'block';
            camera.fov = active ? 20 : 75;
            camera.updateProjectionMatrix();
        }

        function selectWeapon(name, dmg, rate) {
            player.dmg = dmg; player.rate = rate;
            document.getElementById('weapon-info').innerText = name.toUpperCase();
        }

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            isRunning = true;
            renderer.domElement.requestPointerLock();
            if(!enemyBot) spawnBot();
        }

        function shoot() {
            if(!isRunning || !canShoot) return;
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            b.velocity = dir.multiplyScalar(1.8);
            scene.add(b);
            bullets.push(b);
            canShoot = false;
            setTimeout(() => canShoot = true, player.rate);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!isRunning) { renderer.render(scene, camera); return; }

            player.vY -= 0.007; 
            camera.position.y += player.vY;
            let currentFloorY = 0;
            obstacles.forEach(obj => {
                const bSize = obj.geometry.parameters;
                const bPos = obj.position;
                if (Math.abs(camera.position.x - bPos.x) < bSize.width/2 + 0.3 &&
                    Math.abs(camera.position.z - bPos.z) < bSize.depth/2 + 0.3) {
                    let topY = bPos.y + bSize.height/2;
                    if (camera.position.y >= topY + 1.2) currentFloorY = topY;
                }
            });

            if(camera.position.y < currentFloorY + 1.7) {
                camera.position.y = currentFloorY + 1.7;
                player.vY = 0;
                player.grounded = true;
            } else { player.grounded = false; }

            let s = keys.shift ? 0.26 : 0.15;
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), dir).normalize();
            if(keys.w) camera.position.add(dir.multiplyScalar(s));
            if(keys.s) camera.position.sub(dir.multiplyScalar(s));
            if(keys.a) camera.position.add(side.multiplyScalar(s));
            if(keys.d) camera.position.sub(side.multiplyScalar(s));

            // AI Logic
            if(enemyBot) {
                const dist = enemyBot.mesh.position.distanceTo(camera.position);
                if(dist < 22) {
                    enemyBot.mesh.lookAt(camera.position.x, 0, camera.position.z);
                    if(Date.now() - enemyBot.lastShot > 1300) {
                        player.hp -= 10;
                        document.getElementById('hp-fill').style.width = player.hp + "%";
                        document.getElementById('damage-flash').style.display = 'block';
                        setTimeout(() => document.getElementById('damage-flash').style.display = 'none', 100);
                        enemyBot.lastShot = Date.now();
                        if(player.hp <= 0) { isRunning = false; document.exitPointerLock(); document.getElementById('death-screen').style.display = 'flex'; }
                    }
                } else {
                    enemyBot.mesh.lookAt(enemyBot.targetPos);
                    const moveDir = new THREE.Vector3().subVectors(enemyBot.targetPos, enemyBot.mesh.position).normalize();
                    enemyBot.mesh.position.add(moveDir.multiplyScalar(0.05));
                    if(enemyBot.mesh.position.distanceTo(enemyBot.targetPos) < 1) setNewBotDir();
                }
            }

            // Hitbox Peluru
            bullets.forEach((b, i) => {
                b.position.add(b.velocity);
                
                staticTargets.forEach((t, j) => {
                    if(b.position.distanceTo(t.position) < 0.8) {
                        t.position.set((Math.random()-0.5)*50, 1.5 + Math.random()*8, (Math.random()-0.5)*50);
                        player.score += 50;
                        document.getElementById('score-val').innerText = player.score;
                        scene.remove(b); bullets.splice(i, 1);
                    }
                });

                if(enemyBot && b.position.distanceTo(enemyBot.mesh.position.clone().add(new THREE.Vector3(0,1.2,0))) < 1.1) {
                    enemyBot.hp -= player.dmg;
                    scene.remove(b); bullets.splice(i, 1);
                    if(enemyBot.hp <= 0) { player.score += 250; document.getElementById('score-val').innerText = player.score; spawnBot(); }
                }

                if(b.position.length() > 90) { scene.remove(b); bullets.splice(i, 1); }
            });

            renderer.render(scene, camera);
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
